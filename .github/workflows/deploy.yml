- name: Deploy
  uses: appleboy/ssh-action@v1

  with:
    host: ${{ secrets.HOST }}
    username: ubuntu
    key: ${{ secrets.SSH_KEY }}

    script: |
      docker pull ghcr.io/legendairy/myapp:latest
      docker stop myapp || true
      docker rm myapp || true
      docker run -d \
        --name myapp \
        -p 80:3000 \
        ghcr.io/legendairy/myapp:latest
