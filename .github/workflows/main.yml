name: Setup Node.js environment

on:
            pull_request: 
            push:
            
jobs:
  test:
            runs-on: ubuntu-latest

            steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                node-version: 24
            - run: npm install

  build:

    permissions:
      packages: write
      contents: read

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag ghcr.io/legendairy75/cicd:latest
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
       registry: ghcr.io
       username: ${{ github.actor }}
       password: ${{ secrets.GITHUB_TOKEN }}
    - name: Push
      run: |
       docker push ghcr.io/legendairy75/cicd:latest
  
  deploy:

    needs: build
    runs-on: ubuntu-latest

    steps:
    
    - uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.HOST }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY }}

        script: |
          docker pull ghcr.io/user/myapp:latest
          docker stop myapp || true
          docker rm myapp || true
          docker run -d \
            --name myapp \
            -p 80:3000 \
            ghcr.io/user/myapp:latest
    
